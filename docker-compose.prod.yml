## POSVENDELO — Production Compose
## Uses pre-built image from GHCR + Watchtower for auto-updates.
##
## First time:
##   docker login ghcr.io -u <github-user>
##   cp .env.example .env  # edit secrets
##   docker compose -f docker-compose.prod.yml up -d
##
## The api container auto-updates when a new image is pushed to GHCR.

services:
  # ── PostgreSQL (NO auto-update) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: titan_pos
      POSTGRES_USER: titan_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan_user -d titan_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ── API (auto-updated by Watchtower) ────────────────────
  api:
    image: ${BACKEND_IMAGE:-ghcr.io/uriel2121ger-art/posvendelo:latest}
    environment:
      DATABASE_URL: "postgresql+asyncpg://titan_user:${POSTGRES_PASSWORD}@postgres:5432/titan_pos"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8080,http://127.0.0.1:8080}"
      LOGIN_RATE_LIMIT: "${LOGIN_RATE_LIMIT:-30/minute}"
      ADMIN_API_USER: "${ADMIN_API_USER:-admin}"
      ADMIN_API_PASSWORD: "${ADMIN_API_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      CONTROL_PLANE_URL: "${CONTROL_PLANE_URL:-}"
      TITAN_LICENSE_KEY: "${TITAN_LICENSE_KEY:-}"
      TITAN_BRANCH_ID: "${TITAN_BRANCH_ID:-}"
      TITAN_VERSION: "${TITAN_VERSION:-2.0.0}"
      DEBUG: "false"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/run/cups/cups.sock:/var/run/cups/cups.sock
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ── Backups PostgreSQL (retencion local simple) ────────────
  db-backup:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c 'while true; do
        FNAME="/backups/titan_$$(date +%Y%m%d_%H%M).dump";
        pg_dump -h postgres -U titan_user -Fc titan_pos > "$$FNAME";
        ls -t /backups/*.dump | tail -n +9 | xargs rm -f 2>/dev/null || true;
        sleep 21600;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Cloudflare Tunnel (opcional) ───────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ── Watchtower — actualiza backend cada 15 min; actualización inmediata: pull + up -d api ──
  watchtower:
    image: containrrr/watchtower:latest
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-900}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped

volumes:
  pgdata:
