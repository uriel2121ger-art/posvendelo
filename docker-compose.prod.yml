## TITAN POS — Production Compose
## Uses pre-built image from GHCR + Watchtower for auto-updates.
##
## First time:
##   docker login ghcr.io -u <github-user>
##   cp .env.example .env  # edit secrets
##   docker compose -f docker-compose.prod.yml up -d
##
## The api container auto-updates when a new image is pushed to GHCR.

services:
  # ── PostgreSQL (NO auto-update) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: titan_pos
      POSTGRES_USER: titan_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan_user -d titan_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API (auto-updated by Watchtower) ────────────────────
  api:
    image: ghcr.io/uriel2121ger-art/titan-pos:latest
    environment:
      DATABASE_URL: "postgresql+asyncpg://titan_user:${POSTGRES_PASSWORD}@postgres:5432/titan_pos"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8080,http://127.0.0.1:8080,null}"
      ADMIN_API_USER: "${ADMIN_API_USER:-admin}"
      ADMIN_API_PASSWORD: "${ADMIN_API_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      DEBUG: "false"
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  # ── Watchtower (auto-pull new images) ───────────────────
  watchtower:
    image: containrrr/watchtower:latest
    environment:
      WATCHTOWER_POLL_INTERVAL: 1800
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped

volumes:
  pgdata:
