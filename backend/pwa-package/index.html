<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TITAN Command</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent: #00d4ff;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --accent-danger: #ff4757;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2d2d44;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--accent), var(--accent-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .nav-tabs {
            display: flex;
            background: var(--bg-secondary);
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1;
            min-width: 70px;
            padding: 12px 8px;
            text-align: center;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-tab-icon {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 4px;
        }

        .content {
            padding: 15px;
            padding-bottom: 100px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .branch-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .branch-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .branch-status.online {
            background: var(--accent-success);
        }

        .branch-status.offline {
            background: var(--accent-danger);
        }

        .branch-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .branch-details {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .scanner-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        #scanner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 3px solid var(--accent);
            border-radius: 12px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent-success), #00cc66);
            color: white;
        }

        .input {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .product-result {
            display: none;
        }

        .product-result.visible {
            display: block;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-success);
            margin: 15px 0;
        }

        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-success));
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            z-index: 100;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: flex-end;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>⚡ TITAN Command</h1>
        <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
            <span class="status-dot"></span>
            <span id="connection-status">Conectado</span>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-page="dashboard"><span class="nav-tab-icon">📊</span>Dashboard</button>
        <button class="nav-tab" data-page="branches"><span class="nav-tab-icon">🏪</span>Sucursales</button>
        <button class="nav-tab" data-page="scanner"><span class="nav-tab-icon">📷</span>Escáner</button>
        <button class="nav-tab" data-page="products"><span class="nav-tab-icon">📦</span>Productos</button>
        <button class="nav-tab" data-page="inventory"><span class="nav-tab-icon">📋</span>Inventario</button>
    </nav>

    <main class="content">
        <section id="dashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-sales">$0</div>
                    <div class="stat-label">Ventas Hoy</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-transactions">0</div>
                    <div class="stat-label">Transacciones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-branches">0</div>
                    <div class="stat-label">Sucursales Activas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="low-stock">0</div>
                    <div class="stat-label">Stock Bajo</div>
                </div>
            </div>
            <div class="card" style="margin-top: 15px;">
                <div class="card-title">📈 Ventas por Sucursal</div>
                <div id="sales-by-branch"></div>
            </div>
        </section>

        <section id="branches" class="page">
            <div class="card">
                <div class="card-title">🏪 Sucursales</div>
                <div id="branches-list"></div>
            </div>
        </section>

        <section id="scanner" class="page">
            <div class="card">
                <div class="card-title">📷 Escanear Producto</div>
                <div id="qr-reader" style="width: 100%; border-radius: 12px; overflow: hidden;"></div>
                <div style="text-align: center; margin: 10px 0; color: var(--text-secondary); font-size: 0.8rem;">
                    Apunta al código de barras
                </div>
                <input type="text" class="input" id="manual-barcode" placeholder="O escribe el código..."
                    style="margin-top: 15px;">
                <button class="btn btn-primary" onclick="searchProduct()">🔍 Buscar</button>
            </div>
            <div class="card product-result" id="product-result">
                <div style="font-size: 1.2rem; font-weight: 700;" id="result-name">Producto</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);" id="result-sku">SKU: 0000</div>
                <div class="product-price" id="result-price">$0.00</div>
                <label class="input-label">Nuevo Precio</label>
                <input type="number" class="input" id="new-price" step="0.01">
                <button class="btn btn-success" onclick="updatePrice()">💾 Actualizar en Todas las Sucursales</button>

                <div id="product-history" style="margin-top: 20px;">
                    <div class="card-title">📜 Historial de Cambios</div>
                    <div id="history-list" style="font-size: 0.8rem;"></div>
                </div>
            </div>
        </section>

        <section id="products" class="page">
            <div class="card">
                <div class="card-title">📦 Productos</div>
                <input type="text" class="input" placeholder="🔍 Buscar..." id="product-search">
                <div id="products-list"></div>
            </div>
        </section>

        <section id="inventory" class="page">
            <div class="card">
                <div class="card-title">📋 Ajustar Inventario</div>
                <label class="input-label">Sucursal</label>
                <select class="input" id="inv-branch">
                    <option value="1">Sucursal Principal</option>
                    <option value="all">Todas</option>
                </select>
                <label class="input-label">Código de Producto</label>
                <input type="text" class="input" id="inv-sku" placeholder="Código">
                <label class="input-label">Cantidad (+/- )</label>
                <input type="number" class="input" id="inv-qty" placeholder="+10 o -5">
                <label class="input-label">Motivo</label>
                <select class="input" id="inv-reason">
                    <option value="recount">Reconteo</option>
                    <option value="damage">Daño</option>
                    <option value="theft">Merma</option>
                    <option value="return">Devolución</option>
                </select>
                <button class="btn btn-primary" onclick="adjustInventory()">📋 Aplicar Ajuste</button>
            </div>
        </section>
    </main>

    <button class="fab" onclick="openAddProduct()">➕</button>

    <div class="modal" id="add-product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Nuevo Producto</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <label class="input-label">Código/SKU</label>
            <input type="text" class="input" id="new-sku">
            <label class="input-label">Nombre</label>
            <input type="text" class="input" id="new-name">
            <label class="input-label">Precio</label>
            <input type="number" class="input" id="new-sell-price" step="0.01">
            <label class="input-label">Costo</label>
            <input type="number" class="input" id="new-cost" step="0.01">
            <label class="input-label">Stock</label>
            <input type="number" class="input" id="new-stock">
            <button class="btn btn-success" onclick="addProduct()">✅ Crear Producto</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = localStorage.getItem('api_url') || 'http://127.0.0.1:8000';
        const API_TOKEN = localStorage.getItem('api_token') || '';

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.page).classList.add('active');
                if (tab.dataset.page === 'scanner') startScanner();
                else stopScanner();
            });
        });

        let errorCount = 0;

        async function api(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_TOKEN}` } };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                errorCount = 0; // Reset on success
                document.querySelector('.status-dot').style.background = 'var(--accent-success)';
                document.getElementById('connection-status').textContent = 'Conectado';
                return await response.json();
            } catch (error) {
                errorCount++;
                if (errorCount >= 3) {
                    document.querySelector('.status-dot').style.background = 'var(--accent-danger)';
                    document.getElementById('connection-status').textContent = 'Sin conexión';
                    showToast('Error de conexión');
                }
                return null;
            }
        }

        async function loadDashboard() {
            const data = await api('/api/reports/branches');
            if (!data) return;
            let totalSales = 0, totalTransactions = 0, activeBranches = 0;
            const html = data.branches.map(b => {
                totalSales += b.today_sales_total || 0;
                totalTransactions += b.today_sales_count || 0;
                if (b.is_online) activeBranches++;
                return `<div class="branch-item"><div class="branch-status ${b.is_online ? 'online' : 'offline'}"></div><div><div class="branch-name">${escapeHtml(b.name)}</div><div class="branch-details">$${(b.today_sales_total || 0).toFixed(2)} • ${b.today_sales_count || 0} ventas</div></div></div>`;
            }).join('');
            document.getElementById('total-sales').textContent = `$${totalSales.toFixed(2)}`;
            document.getElementById('total-transactions').textContent = totalTransactions;
            document.getElementById('active-branches').textContent = activeBranches;
            document.getElementById('sales-by-branch').innerHTML = html;
            document.getElementById('branches-list').innerHTML = html;
        }

        let html5QrcodeScanner = null;

        async function startScanner() {
            try {
                if (html5QrcodeScanner) {
                    return; // Ya está corriendo
                }

                html5QrcodeScanner = new Html5Qrcode("qr-reader");

                await html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 150 },
                        aspectRatio: 1.5
                    },
                    (decodedText) => {
                        // Código escaneado exitosamente
                        showToast('✅ Código: ' + decodedText);
                        document.getElementById('manual-barcode').value = decodedText;

                        // Vibrar para feedback
                        if (navigator.vibrate) navigator.vibrate(100);

                        // Buscar automáticamente
                        searchProduct();
                    },
                    (errorMessage) => {
                        // Ignorar errores de escaneo continuo
                    }
                );

                showToast('📷 Escáner activo');
            } catch (e) {
                console.error('Error escáner:', e);
                showToast('⚠️ Usa el campo manual');
            }
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(e => console.log('Stop error:', e));
                html5QrcodeScanner = null;
            }
        }

        async function searchProduct() {
            const code = document.getElementById('manual-barcode').value.trim();
            if (!code) {
                showToast('Escribe un código');
                return;
            }
            showToast('Buscando...');
            const data = await api(`/api/products/search?sku=${code}`);
            console.log('Resultado búsqueda:', data);
            if (data && data.product) {
                const p = data.product;
                document.getElementById('result-name').textContent = p.name || 'Sin nombre';
                document.getElementById('result-sku').textContent = `SKU: ${p.sku}`;
                document.getElementById('result-price').textContent = `$${Number(p.price || 0).toFixed(2)}`;
                document.getElementById('new-price').value = p.price || 0;
                document.getElementById('product-result').classList.add('visible');

                // Mostrar historial
                const historyHtml = (data.history || []).map(h => {
                    if (h.type === 'precio') {
                        return `<div style="padding: 8px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 6px;">
                            💲 <strong>Precio actualizado</strong> → $${Number(h.value) || 0}<br>
                            <span style="color: var(--text-secondary);">${escapeHtml(h.date)}</span>
                        </div>`;
                    } else {
                        const sign = h.value > 0 ? '+' : '';
                        return `<div style="padding: 8px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 6px;">
                            📦 <strong>Inventario</strong> ${sign}${Number(h.value) || 0} (${escapeHtml(h.reason)})<br>
                            <span style="color: var(--text-secondary);">${escapeHtml(h.date)}</span>
                        </div>`;
                    }
                }).join('');

                document.getElementById('history-list').innerHTML = historyHtml || '<div style="color: var(--text-secondary);">Sin cambios registrados</div>';

                showToast('✅ Producto encontrado');
            } else {
                showToast('Producto no encontrado');
                document.getElementById('product-result').classList.remove('visible');
            }
        }

        async function updatePrice() {
            const sku = document.getElementById('result-sku').textContent.replace('SKU: ', '');
            const price = parseFloat(document.getElementById('new-price').value);
            if (!price) return;
            const result = await api('/api/products/update', 'POST', { sku, price });
            if (result && result.success) {
                showToast('✅ Precio actualizado!');
                document.getElementById('result-price').textContent = `$${price.toFixed(2)}`;
            }
        }

        async function adjustInventory() {
            const data = { branch_id: document.getElementById('inv-branch').value, sku: document.getElementById('inv-sku').value, quantity: parseInt(document.getElementById('inv-qty').value), reason: document.getElementById('inv-reason').value };
            const result = await api('/api/inventory/adjust', 'POST', data);
            if (result && result.success) { showToast('✅ Inventario ajustado!'); document.getElementById('inv-sku').value = ''; document.getElementById('inv-qty').value = ''; }
        }

        function openAddProduct() { document.getElementById('add-product-modal').classList.add('visible'); }
        function closeModal() { document.getElementById('add-product-modal').classList.remove('visible'); }

        async function addProduct() {
            const product = { sku: document.getElementById('new-sku').value, name: document.getElementById('new-name').value, price: parseFloat(document.getElementById('new-sell-price').value), cost: parseFloat(document.getElementById('new-cost').value), stock: parseInt(document.getElementById('new-stock').value) || 0 };
            const result = await api('/api/products/create', 'POST', product);
            if (result && result.success) { showToast('✅ Producto creado!'); closeModal(); }
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 3000); }

        document.addEventListener('DOMContentLoaded', () => {
            // Usar automáticamente la URL actual (sin /pwa/)
            const currentUrl = window.location.origin;
            localStorage.setItem('api_url', currentUrl);

            // Pedir token si no existe
            if (!localStorage.getItem('api_token')) {
                const token = prompt('Token de acceso:');
                if (token) localStorage.setItem('api_token', token);
            }

            loadDashboard();
            setInterval(loadDashboard, 30000);
        });
    </script>
</body>

</html>
