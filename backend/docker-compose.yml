# =============================================================================
# TITAN POS — Docker Compose (Phase 4: Gateway + Redis + Microservices)
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f monolith   # Follow monolith logs
#   docker compose ps                 # Check status
#
# Architecture:
#   Traefik (port 80) → routes to monolith:8000 or employees-svc:8001
#   Redis (port 6379) → cache + event streams
#   PostgreSQL (port 5432) → shared database (all services)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik — API Gateway (replaces titan_gateway_modular.py)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - titan-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Shared Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: titan_pos
      POSTGRES_USER: titan_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-POvBSlIvC9jB76ZtYBvaFw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan_user -d titan_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - titan-net

  # ---------------------------------------------------------------------------
  # Redis — Cache + Event Streams
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - titan-net

  # ---------------------------------------------------------------------------
  # Monolith — Main TITAN POS Backend (port 8000)
  # ---------------------------------------------------------------------------
  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://titan_user:${POSTGRES_PASSWORD:-POvBSlIvC9jB76ZtYBvaFw}@postgres:5432/titan_pos"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "*"
      CORS_ALLOWED_ORIGINS: "*"
      EMPLOYEES_MICROSERVICE: "false"  # Toggle to "true" to route to employees-svc
      EMPLOYEES_SVC_URL: "http://employees-svc:8001"
      ADMIN_API_USER: "${ADMIN_API_USER:-admin}"
      ADMIN_API_PASSWORD: "${ADMIN_API_PASSWORD:-titanpos2026}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Default route: everything goes to monolith
      - "traefik.http.routers.monolith.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.monolith.entrypoints=web"
      - "traefik.http.routers.monolith.priority=1"
      - "traefik.http.services.monolith.loadbalancer.server.port=8000"
      # Health endpoint
      - "traefik.http.routers.monolith-health.rule=Path(`/health`)"
      - "traefik.http.routers.monolith-health.entrypoints=web"
      - "traefik.http.services.monolith-health.loadbalancer.server.port=8000"
    restart: unless-stopped
    networks:
      - titan-net

  # ---------------------------------------------------------------------------
  # Employees Microservice (port 8001)
  # ---------------------------------------------------------------------------
  employees-svc:
    build:
      context: ./services/employees-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://titan_user:${POSTGRES_PASSWORD:-POvBSlIvC9jB76ZtYBvaFw}@postgres:5432/titan_pos"
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Employees routes go directly to microservice (higher priority)
      - "traefik.http.routers.employees.rule=PathPrefix(`/api/v1/employees`)"
      - "traefik.http.routers.employees.entrypoints=web"
      - "traefik.http.routers.employees.priority=10"
      - "traefik.http.services.employees.loadbalancer.server.port=8001"
    restart: unless-stopped
    networks:
      - titan-net

volumes:
  pgdata:
  redisdata:

networks:
  titan-net:
    driver: bridge
