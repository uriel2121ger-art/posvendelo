name: POSVENDELO Release Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release config
        env:
          CP_RELEASES_URL: ${{ secrets.CP_RELEASES_URL }}
        run: npm run check:release-config

      - name: Build Linux artifact
        env:
          CP_RELEASES_URL: ${{ secrets.CP_RELEASES_URL }}
        run: npm run build:linux

      - name: Verify Linux dist outputs
        env:
          DIST_EXPECT_PLATFORM: linux
        run: npm run dist:verify

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-linux
          path: frontend/dist/**

  build-windows:
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release config
        shell: bash
        env:
          CP_RELEASES_URL: ${{ secrets.CP_RELEASES_URL }}
        run: npm run check:release-config

      - name: Build Windows artifact
        shell: bash
        env:
          CP_RELEASES_URL: ${{ secrets.CP_RELEASES_URL }}
        run: npm run build:win

      - name: Verify Windows dist outputs
        shell: bash
        env:
          DIST_EXPECT_PLATFORM: windows
        run: npm run dist:verify

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-windows
          path: frontend/dist/**

  build-android-cajero:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build browser target
        run: npm run build:browser

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Upload cajero APK
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-cajero-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk

  build-owner-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: owner-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: owner-app/package-lock.json

      - name: Install owner-app dependencies
        run: npm ci

      - name: Build Linux Electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:linux

      - name: Upload owner Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-owner-linux
          path: owner-app/dist/*.AppImage

      - name: Build owner Android APK
        run: npm run build:android

      - name: Build owner APK
        working-directory: owner-app/android
        run: ./gradlew assembleRelease
        if: hashFiles('owner-app/android/build.gradle') != ''

      - name: Upload owner APK
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-owner-apk
          path: owner-app/android/app/build/outputs/apk/release/*.apk
        if: hashFiles('owner-app/android/build.gradle') != ''

  publish-metadata:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-android-cajero, build-owner-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: posvendelo-linux
          path: release-artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: posvendelo-windows
          path: release-artifacts/windows

      - name: Download cajero APK
        uses: actions/download-artifact@v4
        with:
          name: posvendelo-cajero-apk
          path: release-artifacts/android-cajero

      - name: Download owner Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: posvendelo-owner-linux
          path: release-artifacts/owner-linux

      - name: Download owner APK
        uses: actions/download-artifact@v4
        with:
          name: posvendelo-owner-apk
          path: release-artifacts/owner-android
        continue-on-error: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.snap" -o -name "*setup.exe" -o -name "*.exe" -o -name "*.apk" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Generate distribution manifest
        run: |
          DIST_DIR="release-artifacts" node frontend/scripts/verify-dist-artifacts.mjs

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/linux/**/*.AppImage
            release-artifacts/linux/**/*.deb
            release-artifacts/linux/**/*.snap
            release-artifacts/windows/**/*setup.exe
            release-artifacts/windows/**/*.exe
            release-artifacts/android-cajero/**/*.apk
            release-artifacts/owner-linux/**/*.AppImage
            release-artifacts/owner-android/**/*.apk
            release-artifacts/SHA256SUMS.txt
            release-artifacts/dist-manifest.json
          generate_release_notes: true

      - name: Publish release metadata to control plane
        env:
          CP_RELEASES_PUBLISH_URL: ${{ secrets.CP_RELEASES_PUBLISH_URL }}
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          CP_RELEASES_URL: ${{ secrets.CP_RELEASES_URL }}
        run: |
          if [[ -z "${CP_RELEASES_PUBLISH_URL}" || -z "${CP_RELEASES_TOKEN}" ]]; then
            echo "CP release publish secrets not configured; skipping control-plane metadata publish."
            exit 0
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          RELEASE_BASE_URL="${CP_RELEASES_URL:-https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}}"
          NOTES="Publicado desde GitHub Actions para tag v${VERSION}"
          declare -A ASSET_URLS=(
            ["electron-linux"]="${RELEASE_BASE_URL%/}/posvendelo-${VERSION}.AppImage"
            ["electron-windows"]="${RELEASE_BASE_URL%/}/posvendelo-${VERSION}-setup.exe"
            ["android-cajero"]="${RELEASE_BASE_URL%/}/app-release.apk"
            ["owner-linux"]="${RELEASE_BASE_URL%/}/posvendelo-owner-${VERSION}.AppImage"
            ["owner-android"]="${RELEASE_BASE_URL%/}/posvendelo-owner-${VERSION}.apk"
            ["backend"]="ghcr.io/${GITHUB_REPOSITORY_OWNER}/posvendelo:${VERSION}"
          )

          for ARTIFACT in electron-linux electron-windows android-cajero owner-linux owner-android backend; do
            TARGET_REF="${ASSET_URLS[$ARTIFACT]}"
            curl -fsSL -X POST "${CP_RELEASES_PUBLISH_URL}" \
              -H "Content-Type: application/json" \
              -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
              -d "{\"version\":\"${VERSION}\",\"platform\":\"desktop\",\"artifact\":\"${ARTIFACT}\",\"channel\":\"stable\",\"target_ref\":\"${TARGET_REF}\",\"notes\":\"${NOTES}\",\"source\":\"github-actions\"}"
          done
