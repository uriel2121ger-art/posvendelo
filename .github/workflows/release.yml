name: POSVENDELO — Release Artifacts

# Dispara en push de tags con formato vX.Y.Z
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref_override:
        description: "Tag to build (e.g. v1.0.7). Required for workflow_dispatch."
        required: false
        type: string

# Variables compartidas entre todos los jobs
# Control-plane expuesto via Cloudflare Tunnel en posvendelo.com
env:
  CP_URL: "https://posvendelo.com"
  GHCR_IMAGE: "ghcr.io/uriel2121ger-art/posvendelo"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Backend — imagen Docker al GHCR + registro en control-plane
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-backend:
    name: "Backend — Docker → GHCR"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Login al GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer version del tag
        id: ver
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::GITHUB_REF_NAME='$REF' is not a valid version tag (expected vX.Y.Z)"
            exit 1
          fi
          echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.ver.outputs.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest

      - name: Registrar backend en control-plane
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          curl -sf --max-time 60 \
            -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST "${CP_URL}/api/v1/releases/upload" \
            -d "{
              \"platform\": \"desktop\",
              \"artifact\": \"backend\",
              \"version\": \"${VERSION}\",
              \"channel\": \"stable\",
              \"target_ref\": \"${GHCR_IMAGE}:${VERSION}\",
              \"source\": \"github-actions\"
            }"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Frontend Linux — AppImage + .deb
# ─────────────────────────────────────────────────────────────────────────────
  build-frontend-linux:
    name: "Frontend Linux — AppImage + deb"
    runs-on: ubuntu-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Extraer version del tag
        id: ver
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::GITHUB_REF_NAME='$REF' is not a valid version tag (expected vX.Y.Z)"
            exit 1
          fi
          echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Inyectar version del tag
        working-directory: frontend
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Build Linux (AppImage + deb + flatpak)
        working-directory: frontend
        run: npm run build:linux

      - name: Subir AppImage al control-plane
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          APPIMAGE=$(find frontend/dist -name "*.AppImage" | head -1)
          echo "AppImage encontrado: $APPIMAGE"
          curl -sf --max-time 300 \
            -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
            -F "platform=desktop" \
            -F "artifact=electron-linux" \
            -F "version=${VERSION}" \
            -F "channel=stable" \
            -F "file=@${APPIMAGE}" \
            "${CP_URL}/api/v1/releases/upload"

      - name: Subir .deb al control-plane
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          DEB=$(find frontend/dist -name "*.deb" | head -1)
          echo ".deb encontrado: $DEB"
          curl -sf --max-time 300 \
            -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
            -F "platform=desktop" \
            -F "artifact=electron-linux-deb" \
            -F "version=${VERSION}" \
            -F "channel=stable" \
            -F "file=@${DEB}" \
            "${CP_URL}/api/v1/releases/upload"

      - name: Subir .flatpak al control-plane
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          FLATPAK=$(find frontend/dist -name "*.flatpak" | head -1)
          if [ -n "$FLATPAK" ]; then
            echo ".flatpak encontrado: $FLATPAK"
            curl -sf --max-time 300 \
              -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
              -F "platform=desktop" \
              -F "artifact=electron-linux-flatpak" \
              -F "version=${VERSION}" \
              -F "channel=stable" \
              -F "file=@${FLATPAK}" \
              "${CP_URL}/api/v1/releases/upload"
          else
            echo "No .flatpak found, skipping upload"
          fi

      - name: Guardar artifacts para GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-linux
          path: |
            frontend/dist/*.AppImage
            frontend/dist/*.deb
            frontend/dist/*.flatpak

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Frontend Windows — NSIS .exe
# ─────────────────────────────────────────────────────────────────────────────
  build-frontend-windows:
    name: "Frontend Windows — NSIS exe"
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Extraer version del tag
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::GITHUB_REF_NAME='$REF' is not a valid version tag (expected vX.Y.Z)"
            exit 1
          fi
          echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Inyectar version del tag
        shell: bash
        working-directory: frontend
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Build Windows (NSIS)
        working-directory: frontend
        run: npm run build:win

      - name: Subir .exe al control-plane
        continue-on-error: true
        shell: bash
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          EXE=$(find frontend/dist -name "*setup.exe" | head -1)
          echo "Instalador encontrado: $EXE"
          curl -sf --max-time 300 \
            -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
            -F "platform=desktop" \
            -F "artifact=electron-windows" \
            -F "version=${VERSION}" \
            -F "channel=stable" \
            -F "file=@${EXE}" \
            "${CP_URL}/api/v1/releases/upload"

      - name: Guardar artifact para GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-windows
          path: frontend/dist/*setup.exe

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: Frontend Android — APK (cajero)
# ─────────────────────────────────────────────────────────────────────────────
  build-frontend-android:
    name: "Frontend Android — APK cajero"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Extraer version del tag
        id: ver
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::GITHUB_REF_NAME='$REF' is not a valid version tag (expected vX.Y.Z)"
            exit 1
          fi
          VERSION=${REF#v}
          # Convertir vX.Y.Z a codigo numerico (ej: 1.2.3 → 10203)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Inyectar version del tag
        working-directory: frontend
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Build web para Android
        working-directory: frontend
        run: npm run build:browser

      - name: Sincronizar Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK release
        working-directory: frontend/android
        env:
          APK_VERSION_NAME: ${{ steps.ver.outputs.VERSION }}
          APK_VERSION_CODE: ${{ steps.ver.outputs.VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Subir APK al control-plane
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          APK="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          echo "APK encontrado: $APK"
          curl -sf --max-time 300 \
            -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
            -F "platform=android" \
            -F "artifact=android-cajero" \
            -F "version=${VERSION}" \
            -F "channel=stable" \
            -F "file=@${APK}" \
            "${CP_URL}/api/v1/releases/upload"

      - name: Guardar APK para GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: posvendelo-cajero-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk

