# ─────────────────────────────────────────────────────────────────────────────
# JOB FINAL: GitHub Release con todos los artifacts + checksums
# ─────────────────────────────────────────────────────────────────────────────
  publish-github-release:
    name: "Publicar GitHub Release"
    if: always()
    needs:
      - build-backend
      - build-frontend-linux
      - build-frontend-linux-arm64
      - build-frontend-windows
      - build-frontend-android
      - build-owner-linux
      - build-owner-windows
      - build-owner-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar artifacts Linux frontend
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-linux
          path: release-artifacts/linux

      - name: Descargar artifacts Linux ARM64
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-linux-arm64
          path: release-artifacts/linux-arm64

      - name: Descargar artifacts Windows frontend
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-windows
          path: release-artifacts/windows

      - name: Descargar APK cajero
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-cajero-apk
          path: release-artifacts/android-cajero

      - name: Descargar artifacts Linux owner
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-owner-linux
          path: release-artifacts/owner-linux

      - name: Descargar artifacts Windows owner
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-owner-windows
          path: release-artifacts/owner-windows

      - name: Descargar APK owner
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posvendelo-owner-apk
          path: release-artifacts/owner-android

      - name: Renombrar APKs para evitar conflicto de nombres
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f release-artifacts/android-cajero/app-release.apk ]; then
            mv release-artifacts/android-cajero/app-release.apk \
               release-artifacts/android-cajero/posvendelo-cajero-${VERSION}.apk
          fi
          if [ -f release-artifacts/owner-android/app-release.apk ]; then
            mv release-artifacts/owner-android/app-release.apk \
               release-artifacts/owner-android/posvendelo-owner-${VERSION}.apk
          fi

      - name: Generar checksums SHA256
        run: |
          cd release-artifacts
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.flatpak" -o -name "*setup.exe" -o -name "*.apk" \) \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          make_latest: true
          generate_release_notes: true
          files: |
            release-artifacts/linux/*.AppImage
            release-artifacts/linux/*.deb
            release-artifacts/linux/*.flatpak
            release-artifacts/linux-arm64/*.deb
            release-artifacts/windows/*setup.exe
            release-artifacts/android-cajero/*.apk
            release-artifacts/owner-linux/*.AppImage
            release-artifacts/owner-linux/*.deb
            release-artifacts/owner-windows/*setup.exe
            release-artifacts/owner-android/*.apk
            release-artifacts/SHA256SUMS.txt

      - name: Registrar desktop artifacts grandes en control-plane (via GitHub Release URL)
        continue-on-error: true
        env:
          CP_RELEASES_TOKEN: ${{ secrets.CP_RELEASES_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          GH_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          register() {
            local artifact="$1" platform="$2" filename="$3"
            local url="${GH_BASE}/${filename}"
            echo "Registrando ${artifact} → ${url}"
            curl --fail-with-body --max-time 30 \
              -H "X-Release-Token: ${CP_RELEASES_TOKEN}" \
              -F "platform=${platform}" \
              -F "artifact=${artifact}" \
              -F "version=${VERSION}" \
              -F "channel=stable" \
              -F "target_ref=${url}" \
              "${CP_URL}/api/v1/releases/upload" || echo "  WARN: falló registro de ${artifact}"
          }

          # Frontend desktop (>100MB — exceden Cloudflare Tunnel free limit)
          register "electron-linux"     "desktop" "posvendelo-${VERSION}.AppImage"
          register "electron-linux-deb" "desktop" "posvendelo_${VERSION}_amd64.deb"
          register "electron-windows"   "desktop" "posvendelo-${VERSION}-setup.exe"

          # Owner desktop (>100MB)
          register "owner-linux"     "desktop" "posvendelo-owner-${VERSION}.AppImage"
          register "owner-linux-deb" "desktop" "posvendelo-owner-${VERSION}.deb"
          register "owner-windows"   "desktop" "posvendelo-owner-${VERSION}-setup.exe"

          # ARM64 deb
          register "electron-linux-deb-arm64" "desktop" "posvendelo_${VERSION}_arm64.deb"

          # Flatpak (if exists)
          if [ -f "release-artifacts/linux/posvendelo-${VERSION}.flatpak" ]; then
            register "electron-linux-flatpak" "desktop" "posvendelo-${VERSION}.flatpak"
          fi
