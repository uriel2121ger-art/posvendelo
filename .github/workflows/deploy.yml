name: POSVENDELO CI/CD

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Job 1: Lint ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile all .py files
        run: |
          find backend/ -name "*.py" -print0 | xargs -0 python3 -m py_compile
          echo "All Python files compiled successfully"

  # ─── Job 2: Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: titan_pos
          POSTGRES_USER: titan_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U titan_user -d titan_pos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://titan_user:ci_test_password@localhost:5432/titan_pos"
      JWT_SECRET: "ci-test-secret-not-for-production"
      ADMIN_API_USER: "admin"
      ADMIN_API_PASSWORD: "ci_admin_pass"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply base schema
        run: |
          psql "postgresql://titan_user:ci_test_password@localhost:5432/titan_pos" \
            -v ON_ERROR_STOP=1 -f backend/db/schema.sql

      - name: Run migrations
        working-directory: backend
        run: python3 db/migrate.py

      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: "."
        run: pytest tests/ -v --tb=short

  # ─── Job 3: Build & Push (latest+canary on master, stable on v tags) ───
  build-push:
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "tags=${IMAGE}:latest,${IMAGE}:canary,${SHA_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION},${SHA_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Watchtower auto-deploy note
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Image pushed as :latest — Watchtower on homelab (192.168.10.90) will"
          echo "auto-pull and redeploy within 30 min (poll interval configured there)."
          echo "To force an immediate update via Tailscale SSH, run:"
          echo "  ssh prod 'docker exec titan-pos-watchtower-1 /watchtower --run-once'"
