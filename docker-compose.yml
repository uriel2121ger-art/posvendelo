# =============================================================================
# TITAN POS — Docker Compose
#
# Usage:
#   docker compose up -d          # Start services
#   docker compose logs -f api    # Follow API logs
#   docker compose ps             # Check status
#
# Architecture:
#   api (port 8000) → FastAPI + asyncpg
#   postgres (port 5432) → PostgreSQL 15
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: titan_pos
      POSTGRES_USER: titan_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan_user -d titan_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # TITAN POS API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://titan_user:${POSTGRES_PASSWORD}@postgres:5432/titan_pos"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000,http://localhost:3000"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000,http://localhost:3000"
      ADMIN_API_USER: "${ADMIN_API_USER:-admin}"
      ADMIN_API_PASSWORD: "${ADMIN_API_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      DEBUG: "false"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
