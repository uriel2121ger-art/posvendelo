## POSVENDELO — Client Node Compose Template (installers/shared copy)
##
## CANONICAL SOURCE: control-plane/templates/docker-compose.client.yml
## This file MUST stay in sync with the canonical template.
## The control-plane serves the canonical version via GET /api/v1/branches/compose-template
##
## All secrets must be provided via the .env file generated by the installer.

services:

  # ── PostgreSQL — bound to loopback only ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: posvendelo
      POSTGRES_USER: posvendelo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${LOCAL_POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posvendelo_user -d posvendelo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ── POSVENDELO API — auto-updated by Watchtower ─────────────────────────────
  api:
    image: ${BACKEND_IMAGE}
    environment:
      DATABASE_URL: "postgresql+asyncpg://posvendelo_user:${POSTGRES_PASSWORD}@postgres:5432/posvendelo"
      ADMIN_API_USER: ${ADMIN_API_USER}
      ADMIN_API_PASSWORD: ${ADMIN_API_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL}
      POSVENDELO_LICENSE_KEY: ${POSVENDELO_LICENSE_KEY}
      POSVENDELO_BRANCH_ID: ${POSVENDELO_BRANCH_ID}
      POSVENDELO_VERSION: ${POSVENDELO_VERSION:-2.0.0}
      POSVENDELO_LICENSE_ENFORCEMENT: ${POSVENDELO_LICENSE_ENFORCEMENT:-true}
      POSVENDELO_BACKUP_DIR: /backups
      POSVENDELO_AGENT_CONFIG_PATH: /runtime/posvendelo-agent.json
      DEBUG: "false"
    ports:
      # API exposed only on loopback — Cloudflare tunnel provides external access
      - "127.0.0.1:${LOCAL_API_PORT:-8000}:8000"
    volumes:
      # DMI info for hardware fingerprint (auto-registration)
      - /sys/class/dmi/id:/sys/class/dmi/id:ro
      # Mount only the agent config — do NOT mount the entire install dir (.env, CREDENCIALES.txt)
      - ./posvendelo-agent.json:/runtime/posvendelo-agent.json  # rw: backend escribe installToken en auto-registro
      - ./backups:/backups
      # CUPS socket for host printer access (discovery + printing)
      - /var/run/cups/cups.sock:/var/run/cups/cups.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ── Periodic backup — pg_dump every 6 hours, retain 8 dumps ───────────────
  db-backup:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c 'while true; do
        FNAME="/backups/posvendelo_$$(date +%Y%m%d_%H%M).dump";
        pg_dump -h postgres -U posvendelo_user -Fc posvendelo > "$$FNAME";
        ls -t /backups/*.dump | tail -n +9 | xargs rm -f 2>/dev/null || true;
        sleep 21600;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ── Cloudflare Tunnel — provides secure external access without open ports ─
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ── Watchtower — actualiza backend automáticamente (cada 15 min por defecto) ──
  # Para actualizar ya: en el nodo ejecutar ./actualizar.sh
  watchtower:
    image: containrrr/watchtower:latest
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-900}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped

volumes:
  pgdata:
